version: '3.8'

# rabbit-mq bize kuyruk yapısını sağlar. uygulamalar arasında güvenli bir şekilde veri iletişimini sağlar.
# ara yazılımdır (middleware)


services:
  rabbitmq:
    image: rabbitmq:3-management # docker-hub içerisinden hazır image gelir. yönetim paketi olan image
    container_name: rabbitmq_container #container adı

    ports:
      # host makine port : container port
      - "5672:5672" # AMQP (advanced messaging queuing protocol) için. http benzeri - mesajlaşma için kullanılır
      - "15672:15672" # web arayüzü için - yönetim paneline gider

    # rabbit-mq kullanıcı adı-şifre 
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}

    # queue sistemi hazır mı değil mi onu kontrol eder
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 10s # ping interval
      timeout: 5s # cevap bekleme süresi
      retries: 5 # deneme sayısı - fail ederse->çalışmıyor
      start_period: 30s

  # ----CONTAINER_A----
  scraper:
    build: ./container_a # container_a dosyasındaki Dockerfile ile kendisini build eder
    container_name: scraper_container
    depends_on:
      rabbitmq:
        condition: service_healthy # scraper, rabbit_mq hazır olana kadar başlamaz. health check başarılı olmalı

    # container_a nın kullanacağı variable listesi
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
      QUEUE_NAME: ${QUEUE_NAME}
      SCRAPE_INTERVAL: ${SCRAPE_INTERVAL} # ne zamanda bir scrape yapacağım
      RESULT_PER_PAGE: ${RESULT_PER_PAGE}
      MAX_PAGES: ${MAX_PAGES}

    restart: unless-stopped # çökerse otomatik yeniden başlat

  postgres:
    image: postgres:16-alpine
    container_name: postgres_container
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "5432:5432"
    
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: minio_container
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    
    ports:
      - "9000:9000"
      - "9001:9001"

    volumes:
      - minio_data:/data
    
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  consumer:
    build: ./container_b
    container_name: consumer_container
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
      QUEUE_NAME: ${QUEUE_NAME}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_SECURE: "false"
    restart: unless-stopped
    
  web:
    build: ./container_c
    container_name: web_container
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    
    ports:
      - "8080:8080"
    
    environment:
      WEB_PORT: 8080
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_SECURE: "false"
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data: