<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interpol Red Notice Dashboard</title>
    <style>
        :root {
            --bg1: #0f172a;
            --bg2: #1e293b;
            --card: #ffffff;
            --text: #0f172a;
            --muted: #64748b;
            --accent: #0ea5e9;
            --accent-2: #0284c7;
            --danger: #dc2626;
            --line: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Trebuchet MS', 'Segoe UI', sans-serif;
            background: radial-gradient(circle at 15% 20%, #1d4ed8 0, transparent 40%),
                        radial-gradient(circle at 85% 15%, #0ea5e9 0, transparent 45%),
                        linear-gradient(135deg, var(--bg1), var(--bg2));
            min-height: 100vh;
            color: var(--text);
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: var(--card);
            border-radius: 18px;
            box-shadow: 0 18px 45px rgba(2, 6, 23, 0.35);
            padding: 24px;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 8px;
        }
        .subtitle {
            color: var(--muted);
            margin-bottom: 18px;
        }

        .filters {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 10px;
            margin-bottom: 14px;
        }

        .filters input, .filters select, .filters button {
            padding: 10px;
            border: 1px solid var(--line);
            border-radius: 10px;
            font-size: 0.95rem;
        }

        .filters button {
            background: var(--accent);
            color: white;
            cursor: pointer;
            border: none;
            transition: background 0.2s ease;
        }

        .filters button:hover {
            background: var(--accent-2);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
            gap: 10px;
            margin: 16px 0;
        }

        .card {
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 14px;
        }

        .card h3 { font-size: 1.5rem; margin-bottom: 4px; }
        .card p { color: var(--muted); }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
        }
        th, td {
            text-align: left;
            border-bottom: 1px solid var(--line);
            padding: 10px;
            vertical-align: top;
            font-size: 0.92rem;
        }
        th {
            background: #f8fafc;
            cursor: pointer;
            user-select: none;
        }

        .photo {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            object-fit: cover;
            border: 1px solid var(--line);
            background: #e2e8f0;
        }

        .pill {
            display: inline-block;
            font-size: 0.75rem;
            font-weight: 700;
            color: white;
            background: var(--danger);
            padding: 3px 8px;
            border-radius: 999px;
        }

        .pagination {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 12px;
        }

        .pagination button {
            border: 1px solid var(--line);
            background: white;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
        }

        .updates {
            margin-top: 18px;
            border-top: 1px solid var(--line);
            padding-top: 12px;
        }

        .update-item {
            padding: 8px;
            border-bottom: 1px dashed var(--line);
            font-size: 0.9rem;
        }

        .muted {
            color: var(--muted);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Interpol Red Notice Dashboard</h1>
        <p class="subtitle">Server-side filtering with PostgreSQL and MinIO photo proxy</p>

        <div class="filters">
            <input id="search" placeholder="Search name, forename or entity id">
            <input id="nationality" placeholder="Nationality code (example TR)">
            <input id="eyeColor" placeholder="Eye color">
            <select id="hasCriminalRecord">
                <option value="">Criminal record: all</option>
                <option value="true">Has record</option>
                <option value="false">No record</option>
            </select>
            <input id="dobFrom" type="date">
            <input id="dobTo" type="date">
            <button id="applyFilters">Apply</button>
        </div>
        
        <div class="stats">
            <div class="card">
                <h3 id="totalCount">0</h3>
                <p>Total filtered results</p>
            </div>
            <div class="card">
                <h3 id="currentPage">1</h3>
                <p>Current page</p>
            </div>
            <div class="card">
                <h3 id="lastUpdate">-</h3>
                <p>Latest ingest event</p>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th data-sort="entity_id">Entity ID</th>
                    <th data-sort="name">Name</th>
                    <th data-sort="date_of_birth">Birth Date</th>
                    <th>Nationalities</th>
                    <th>Eye Colors</th>
                    <th>Criminal</th>
                    <th data-sort="update_count">Updates</th>
                    <th data-sort="last_updated">Last Updated</th>
                    <th>Photo</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>

        <div class="pagination">
            <button id="prevBtn">Prev</button>
            <button id="nextBtn">Next</button>
        </div>

        <div class="updates">
            <h3>Recent updates</h3>
            <div id="updatesList" class="muted">Loading...</div>
        </div>
    </div>
    
    <script>
        const state = {
            page: 1,
            pageSize: 20,
            sortBy: "last_updated",
            sortOrder: "desc",
            total: 0
        };

        function getFilters() {
            return {
                search: document.getElementById("search").value.trim(),
                nationality: document.getElementById("nationality").value.trim(),
                eye_color: document.getElementById("eyeColor").value.trim(),
                has_criminal_record: document.getElementById("hasCriminalRecord").value,
                dob_from: document.getElementById("dobFrom").value,
                dob_to: document.getElementById("dobTo").value
            };
        }

        function buildQuery() {
            const f = getFilters();
            const params = new URLSearchParams();
            params.set("page", state.page);
            params.set("page_size", state.pageSize);
            params.set("sort_by", state.sortBy);
            params.set("sort_order", state.sortOrder);

            Object.keys(f).forEach((key) => {
                if (f[key]) params.set(key, f[key]);
            });

            return params.toString();
        }

        async function fetchNotices() {
            const res = await fetch("/api/notices?" + buildQuery());
            const data = await res.json();
            state.total = data.total;
            renderNotices(data.items || []);
            document.getElementById("totalCount").textContent = String(data.total);
            document.getElementById("currentPage").textContent = String(data.page);
        }

        function renderNotices(items) {
            const tbody = document.getElementById("tableBody");
            if (!items.length) {
                tbody.innerHTML = "<tr><td colspan='9' class='muted'>No records found</td></tr>";
                return;
            }

            tbody.innerHTML = items.map((x) => {
                const criminal = x.has_criminal_record ? "<span class='pill'>YES</span>" : "<span class='muted'>NO</span>";
                const photo = x.photo_url ? "<img class='photo' src='" + x.photo_url + "' alt='photo'>" : "<span class='muted'>N/A</span>";

                return "<tr>" +
                    "<td>" + (x.entity_id || "-") + "</td>" +
                    "<td>" + ((x.forename || "") + " " + (x.name || "")).trim() + "</td>" +
                    "<td>" + (x.date_of_birth || "-") + "</td>" +
                    "<td>" + (x.nationalities || "-") + "</td>" +
                    "<td>" + (x.eye_colors || "-") + "</td>" +
                    "<td>" + criminal + "</td>" +
                    "<td>" + (x.update_count || 1) + "</td>" +
                    "<td>" + new Date(x.last_updated).toLocaleString("tr-TR") + "</td>" +
                    "<td>" + photo + "</td>" +
                    "</tr>";
            }).join("");
        }

        async function fetchUpdates() {
            const res = await fetch("/api/updates");
            const updates = await res.json();

            if (updates.length > 0) {
                document.getElementById("lastUpdate").textContent =
                    new Date(updates[0].processed_at).toLocaleString("tr-TR");
            }

            const box = document.getElementById("updatesList");
            if (!updates.length) {
                box.innerHTML = "No updates yet";
                return;
            }

            box.innerHTML = updates.slice(0, 10).map((u) => {
                const flag = u.is_update ? "UPDATED" : "NEW";
                return "<div class='update-item'>" +
                    "<strong>" + (u.entity_id || "-") + "</strong> " +
                    "(" + ((u.forename || "") + " " + (u.name || "")).trim() + ") - " +
                    flag + " - " +
                    new Date(u.processed_at).toLocaleString("tr-TR") +
                    "</div>";
            }).join("");
        }

        async function refreshAll() {
            try {
                await Promise.all([fetchNotices(), fetchUpdates()]);
            } catch (e) {
                console.error(e);
            }
        }

        document.getElementById("applyFilters").addEventListener("click", () => {
            state.page = 1;
            refreshAll();
        });

        document.getElementById("prevBtn").addEventListener("click", () => {
            if (state.page > 1) {
                state.page -= 1;
                refreshAll();
            }
        });

        document.getElementById("nextBtn").addEventListener("click", () => {
            const maxPage = Math.max(1, Math.ceil(state.total / state.pageSize));
            if (state.page < maxPage) {
                state.page += 1;
                refreshAll();
            }
        });

        document.querySelectorAll("th[data-sort]").forEach((th) => {
            th.addEventListener("click", () => {
                const key = th.getAttribute("data-sort");
                if (state.sortBy === key) {
                    state.sortOrder = state.sortOrder === "asc" ? "desc" : "asc";
                } else {
                    state.sortBy = key;
                    state.sortOrder = "desc";
                }
                refreshAll();
            });
        });

        refreshAll();
        setInterval(refreshAll, 7000);
    </script>
</body>
</html>
